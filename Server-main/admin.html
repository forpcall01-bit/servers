<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0f0f0f">
<title>GameZone — Super Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
  --bg:#0f0f0f;--s1:#171717;--s2:#1e1e1e;--s3:#272727;--s4:#303030;
  --green:#10b981;--green-bg:rgba(16,185,129,.1);--green-bd:rgba(16,185,129,.3);
  --red:#ef4444;--red-bg:rgba(239,68,68,.1);--red-bd:rgba(239,68,68,.3);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,.1);--amber-bd:rgba(245,158,11,.3);
  --blue:#3b82f6;--blue-bg:rgba(59,130,246,.1);--blue-bd:rgba(59,130,246,.3);
  --purple:#8b5cf6;--purple-bg:rgba(139,92,246,.1);--purple-bd:rgba(139,92,246,.3);
  --t1:#fafafa;--t2:#a3a3a3;--t3:#525252;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.12);
  --r:10px;--r2:14px;--r3:20px;
  --sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--sans);overflow-x:hidden}
.screen{display:none}
.screen.active{display:flex;flex-direction:column;min-height:100vh}
input,textarea,select{font-family:var(--sans);color:var(--t1)}
/* ── Login ── */
#screen-login{align-items:center;justify-content:center;padding:20px}
.login-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r3);padding:40px 36px;width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.login-logo-icon{width:44px;height:44px;border-radius:var(--r2);background:var(--purple-bg);border:1px solid var(--purple-bd);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.login-logo-icon i{font-size:18px;color:var(--purple)}
.login-logo h1{font-size:20px;font-weight:800;letter-spacing:-.4px}
.sa-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:3px 8px;border-radius:99px;background:var(--purple-bg);border:1px solid var(--purple-bd);color:var(--purple);margin-bottom:28px}
.field{margin-bottom:14px}
.field-label{display:block;font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.field-input{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:11px 13px;font-size:13px;color:var(--t1);outline:none;transition:border-color .18s}
.field-input:focus{border-color:var(--purple)}
.field-input::placeholder{color:var(--t3)}
textarea.field-input{resize:vertical;min-height:80px;line-height:1.5}
select.field-input{cursor:pointer;background:var(--bg)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 18px;border-radius:var(--r);font-size:13px;font-weight:600;border:none;cursor:pointer;font-family:var(--sans);transition:all .18s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-full{width:100%}
.btn-primary{background:var(--purple);color:#fff}
.btn-primary:hover{background:#7c3aed}
.btn-primary:disabled{opacity:.45;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid var(--bd2);color:var(--t1)}
.btn-ghost:hover{background:var(--s3)}
.btn-danger{background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red)}
.btn-green{background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green)}
.btn-sm{padding:6px 12px;font-size:11px;border-radius:8px;font-weight:700;letter-spacing:.3px}
/* ── Dashboard ── */
#screen-dash{flex-direction:column}
.topbar{height:60px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;background:var(--s1);border-bottom:1px solid var(--bd);flex-shrink:0;position:sticky;top:0;z-index:50}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-brand-icon{width:32px;height:32px;border-radius:8px;background:var(--purple-bg);border:1px solid var(--purple-bd);display:flex;align-items:center;justify-content:center}
.topbar-brand-icon i{font-size:14px;color:var(--purple)}
.topbar-brand-name{font-size:15px;font-weight:800}
.topbar-badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:2px 7px;border-radius:99px;background:var(--purple-bg);border:1px solid var(--purple-bd);color:var(--purple);margin-left:6px}
.topbar-right{display:flex;align-items:center;gap:8px}
.admin-name{font-size:12px;color:var(--t2);font-weight:500}
.icon-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;color:var(--t3);border-radius:var(--r);font-size:15px;transition:all .15s}
.icon-btn:hover{color:var(--t1);background:var(--s3)}
.content{flex:1;max-width:1200px;width:100%;margin:0 auto;padding:24px 20px}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:28px}
@media(min-width:640px){.stats-grid{grid-template-columns:repeat(4,1fr)}}
.stat-box{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:18px 16px}
.stat-val{font-size:30px;font-weight:800;font-family:var(--mono);line-height:1;letter-spacing:-1px}
.stat-key{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-top:6px}
.section-title{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1.4px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--bd)}
/* Account cards */
.accounts-list{display:flex;flex-direction:column;gap:10px}
.acct-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden;transition:border-color .18s}
.acct-card:hover{border-color:var(--bd2)}
.acct-bar{height:3px}
.acct-body{padding:16px}
.acct-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.acct-info{}
.acct-label{font-size:15px;font-weight:700;margin-bottom:2px}
.acct-label.empty{color:var(--t3);font-style:italic;font-weight:400}
.acct-username{font-size:12px;color:var(--t2);font-family:var(--mono)}
.status-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:3px 8px;border-radius:99px}
.status-badge.pending{background:var(--amber-bg);border:1px solid var(--amber-bd);color:var(--amber)}
.status-badge.active{background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green)}
.status-badge.expired{background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red)}
.status-badge.deactivated{background:var(--s3);border:1px solid var(--bd);color:var(--t3)}
.acct-meta{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:12px}
.meta-item{font-size:11px;color:var(--t2);display:flex;align-items:center;gap:5px}
.meta-item i{color:var(--t3);font-size:10px}
.meta-item.hl{color:var(--t1);font-weight:600}
.acct-notes{font-size:11px;color:var(--t3);font-style:italic;margin-bottom:10px;padding:8px 10px;background:var(--bg);border-radius:var(--r);border:1px solid var(--bd)}
.acct-actions{display:flex;flex-wrap:wrap;gap:6px}
/* Sheet */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:100;opacity:0;pointer-events:none;transition:opacity .22s;display:flex;align-items:center;justify-content:center}
.sheet-bg.open{opacity:1;pointer-events:all}
.sheet{background:var(--s1);border:1px solid var(--bd2);border-radius:var(--r3);padding:28px;z-index:101;opacity:0;pointer-events:none;transform:scale(.95);transition:transform .22s cubic-bezier(.16,1,.3,1),opacity .22s ease;width:calc(100% - 40px);max-width:520px}
.sheet.open{opacity:1;pointer-events:all;transform:scale(1)}
.sheet-handle{display:none}
.sheet-title{font-size:18px;font-weight:800;letter-spacing:-.3px;margin-bottom:20px}
.sheet-btns{display:flex;gap:8px;margin-top:20px}
.sheet-btns .btn{flex:1}
.quick-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.quick-btn{padding:6px 12px;background:var(--s3);border:1px solid var(--bd);border-radius:8px;font-size:11px;font-weight:600;color:var(--t2);cursor:pointer;font-family:var(--sans);transition:all .15s}
.quick-btn:hover{background:var(--purple-bg);border-color:var(--purple-bd);color:var(--purple)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--s2);border:1px solid var(--bd2);border-radius:var(--r2);padding:11px 18px;font-size:12px;font-weight:600;z-index:300;white-space:nowrap;box-shadow:0 8px 28px rgba(0,0,0,.5);transition:transform .28s cubic-bezier(.16,1,.3,1)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--green-bd);color:var(--green)}
.toast.err{border-color:var(--red-bd);color:var(--red)}
.spin{width:15px;height:15px;border:2px solid rgba(255,255,255,.15);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 20px}
.empty-state i{font-size:32px;color:var(--t3);margin-bottom:14px;display:block}
.empty-state h3{font-size:15px;font-weight:700;margin-bottom:4px}
.empty-state p{font-size:12px;color:var(--t2)}
</style>
</head>
<body>

<!-- Login -->
<div class="screen active" id="screen-login">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon"><i class="fa-solid fa-shield-halved"></i></div>
      <div><h1>GameZone</h1></div>
    </div>
    <div class="sa-badge"><i class="fa-solid fa-crown"></i> Super Admin</div>
    <div class="field"><label class="field-label">Username</label><input class="field-input" type="text" id="login-user" placeholder="Username" autocomplete="username" autocapitalize="none"></div>
    <div class="field"><label class="field-label">Password</label><input class="field-input" type="password" id="login-pass" placeholder="Password" autocomplete="current-password"></div>
    <div style="height:8px"></div>
    <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()"><span id="login-btn-text">Sign In</span></button>
    <div id="login-err" style="display:none;margin-top:12px;color:var(--red);font-size:12px;text-align:center"></div>
  </div>
</div>

<!-- Dashboard -->
<div class="screen" id="screen-dash">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-brand-icon"><i class="fa-solid fa-gamepad"></i></div>
      <div class="topbar-brand-name">GameZone<span class="topbar-badge"><i class="fa-solid fa-crown"></i> Super Admin</span></div>
    </div>
    <div class="topbar-right">
      <span class="admin-name" id="admin-name-display"></span>
      <button class="icon-btn" onclick="doLogout()" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></button>
    </div>
  </div>
  <div class="content">
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-val" id="st-total">—</div><div class="stat-key">Total</div></div>
      <div class="stat-box"><div class="stat-val" id="st-pending" style="color:var(--amber)">—</div><div class="stat-key">Pending</div></div>
      <div class="stat-box"><div class="stat-val" id="st-active" style="color:var(--green)">—</div><div class="stat-key">Active</div></div>
      <div class="stat-box"><div class="stat-val" id="st-inactive" style="color:var(--red)">—</div><div class="stat-key">Inactive</div></div>
    </div>
    <div class="section-title">Accounts <button class="btn btn-ghost" style="padding:5px 10px;font-size:11px;margin-left:auto" onclick="loadAccounts()"><i class="fa-solid fa-rotate"></i> Refresh</button></div>
    <div id="accounts-list"><div style="text-align:center;padding:40px"><span class="spin"></span></div></div>
  </div>
</div>

<!-- Edit Sheet -->
<div class="sheet-bg" id="bg-edit" onclick="closeEdit()">
<div class="sheet" id="sheet-edit" onclick="event.stopPropagation()">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="edit-title">Edit Account</div>
  <input type="hidden" id="edit-id">
  <div style="display:flex;gap:10px;margin-bottom:14px">
    <div style="flex:1">
      <label class="field-label">Custom Label</label>
      <input class="field-input" type="text" id="edit-label" placeholder="e.g. Dragon Cafe Karachi">
    </div>
    <div style="flex:1">
      <label class="field-label">Status</label>
      <div style="position:relative">
        <select class="field-input" id="edit-status" style="appearance:none;-webkit-appearance:none;padding-right:32px;cursor:pointer">
          <option value="pending">⏳ Pending</option>
          <option value="active">✅ Active</option>
          <option value="deactivated">⏸ Deactivated</option>
          <option value="expired">❌ Expired</option>
        </select>
        <i class="fa-solid fa-chevron-down" style="position:absolute;right:11px;top:50%;transform:translateY(-50%);pointer-events:none;font-size:10px;color:var(--t3)"></i>
      </div>
    </div>
  </div>
  <div class="field">
    <label class="field-label">Expiry Date</label>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
      <input class="field-input" type="number" id="edit-custom-days" placeholder="Add days..." min="1" style="flex:1">
      <button class="btn btn-ghost" style="padding:9px 14px;font-size:12px;flex-shrink:0;white-space:nowrap" onclick="addCustomDays()"><i class="fa-solid fa-plus"></i> Add Days</button>
      <button class="btn btn-ghost" style="padding:9px 14px;font-size:12px;flex-shrink:0;white-space:nowrap;border-color:var(--green-bd);color:var(--green)" onclick="addCustomDays(30)"><i class="fa-solid fa-rotate-right"></i> +30</button>
    </div>
    <input class="field-input" type="datetime-local" id="edit-expiry">
    <div id="edit-expiry-display" style="font-size:11px;color:var(--t3);margin-top:4px"></div>
    <button onclick="clearExpiry()" style="margin-top:6px;background:none;border:none;color:var(--t3);font-size:11px;cursor:pointer;font-family:var(--sans);padding:0;text-decoration:underline">Clear expiry date</button>
  </div>
  <div class="field"><label class="field-label">Monthly Price</label><input class="field-input" type="number" id="edit-price" placeholder="0.00" step="0.01" min="0"></div>
  <div class="field"><label class="field-label">Notes</label><textarea class="field-input" id="edit-notes" placeholder="Contact info, location, payment notes..."></textarea></div>
  <div class="sheet-btns">
    <button class="btn btn-ghost" onclick="closeEdit()">Cancel</button>
    <button class="btn btn-primary" onclick="saveEdit()"><span id="edit-btn-text">Save Changes</span></button>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const state = { token: sessionStorage.getItem('admin_token'), accounts: [] };
let _toastT;

window.addEventListener('load', () => {
  document.getElementById('admin-name-display').textContent = sessionStorage.getItem('admin_uname') || '';
  if (state.token) { 
    console.log('✅ Auto-login: token found, loading dashboard');
    showDash(); 
    loadAccounts(); 
  }
  else {
    console.log('ℹ️ No token found, showing login');
    showLogin(); 
  }
  // Enter key on login
  document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
  document.getElementById('edit-expiry').addEventListener('change', updateExpiryDisplay);
});

function showLogin() {
  document.getElementById('screen-login').classList.add('active');
  document.getElementById('screen-dash').classList.remove('active');
}
function showDash() {
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-dash').classList.add('active');
}

async function doLogin() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const err = document.getElementById('login-err');
  const btn = document.getElementById('login-btn');
  
  console.log('🔐 Login attempt for:', username);
  
  if (!username || !password) { 
    err.textContent='Fill all fields'; 
    err.style.display='block'; 
    return; 
  }
  
  btn.disabled=true;
  document.getElementById('login-btn-text').innerHTML='<span class="spin"></span>';
  err.style.display='none';
  
  try {
    console.log('📡 Sending login request...');
    const res = await fetch('/api/admin/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username,password})
    });
    
    console.log('📥 Login response status:', res.status);
    
    const d = await res.json();
    console.log('📦 Login response data:', { error: d.error, hasToken: !!d.token });
    
    if (!res.ok) throw new Error(d.error||'Login failed');
    
    state.token = d.token;
    sessionStorage.setItem('admin_token', d.token);
    sessionStorage.setItem('admin_uname', d.username || username);
    document.getElementById('admin-name-display').textContent = d.username || username;
    
    console.log('✅ Login successful, loading dashboard');
    showDash(); 
    loadAccounts();
    
  } catch(e) {
    console.error('❌ Login error:', e);
    err.textContent = e.message; 
    err.style.display='block';
  } finally { 
    btn.disabled=false; 
    document.getElementById('login-btn-text').textContent='Sign In'; 
  }
}

function doLogout() {
  if (!confirm('Logout?')) return;
  console.log('🚪 Logging out');
  sessionStorage.removeItem('admin_token');
  sessionStorage.removeItem('admin_uname');
  state.token = null;
  showLogin();
}

async function api(method, path, body) {
  console.log(`📡 API ${method} ${path}`, body ? {body} : '');
  
  const res = await fetch('/api' + path, {
    method,
    headers:{'Content-Type':'application/json', Authorization:'Bearer '+state.token},
    body: body ? JSON.stringify(body) : undefined
  });
  
  console.log(`📥 API ${method} ${path} response:`, res.status);
  
  const d = await res.json();
  console.log(`📦 API ${method} ${path} data:`, d);
  
  if (res.status === 401) { 
    console.warn('⚠️ API 401 - session expired, logging out');
    doLogout(); 
    throw new Error('Session expired'); 
  }
  if (!res.ok) throw new Error(d.error||'Error');
  return d;
}

async function loadAccounts() {
  console.log('🔍 Loading accounts...');
  
  document.getElementById('accounts-list').innerHTML = 
    '<div style="text-align:center;padding:40px"><span class="spin"></span></div>';
  
  try {
    console.log('📡 Fetching /api/admin/accounts');
    const accounts = await api('GET','/admin/accounts');
    
    console.log('✅ Accounts received:', accounts.length, 
      accounts.map(a => ({username: a.username, status: a.status})));
    
    state.accounts = accounts;
    renderAccounts();
    
    // Show helpful message if no accounts
    if (!accounts.length) {
      console.log('ℹ️ No accounts found in database');
      document.getElementById('accounts-list').innerHTML = 
        '<div class="empty-state">' +
        '<i class="fa-solid fa-users"></i>' +
        '<h3>No accounts found</h3>' +
        '<p>Either no one has registered yet, or all accounts are already approved</p>' +
        '<button class="btn btn-ghost btn-sm" onclick="loadAccounts()" style="margin-top:12px">' +
        '<i class="fa-solid fa-rotate"></i> Refresh' +
        '</button>' +
        '</div>';
    }
    
  } catch(e) {
    console.error('❌ Failed to load accounts:', e);
    
    document.getElementById('accounts-list').innerHTML = 
      `<div class="empty-state">
        <i class="fa-solid fa-triangle-exclamation" style="color:var(--red);font-size:32px"></i>
        <h3>Error Loading Accounts</h3>
        <p style="color:var(--red);font-family:var(--mono);font-size:11px">${e.message}</p>
        <button class="btn btn-ghost btn-sm" onclick="loadAccounts()" style="margin-top:12px">
          <i class="fa-solid fa-rotate"></i> Retry
        </button>
      </div>`;
      
    toast(e.message,'err');
  }
}

function renderAccounts() {
  const accts = state.accounts;
  
  // Stats
  document.getElementById('st-total').textContent = accts.length;
  document.getElementById('st-pending').textContent = accts.filter(a=>a.status==='pending').length;
  document.getElementById('st-active').textContent = accts.filter(a=>a.status==='active').length;
  document.getElementById('st-inactive').textContent = accts.filter(a=>a.status==='deactivated'||a.status==='expired').length;

  const el = document.getElementById('accounts-list');
  if (!accts.length) {
    el.innerHTML = '<div class="empty-state"><i class="fa-solid fa-users"></i><h3>No accounts yet</h3><p>Users will appear here when they register</p></div>';
    return;
  }

  const statusColor = { pending:'#f59e0b', active:'#10b981', expired:'#ef4444', deactivated:'#525252' };

  el.innerHTML = '<div class="accounts-list">' + accts.map(a => {
    const col = statusColor[a.status] || '#525252';
    const expiryText = !a.expiry_date ? 'No expiry'
      : Date.now() > a.expiry_date ? '<span style="color:var(--red)">Expired</span>'
      : `${Math.ceil((a.expiry_date - Date.now()) / 86400000)} days left`;
    const lastAct = timeAgo(a.last_active);
    const label = a.label || '';

    let actions = '';
    if (a.status === 'pending') {
      actions += `<button class="btn btn-green btn-sm" onclick="quickApprove('${a.id}')"><i class="fa-solid fa-check"></i> Approve</button>`;
    } else if (a.status === 'active') {
      actions += `<button class="btn btn-ghost btn-sm" onclick="quickDeactivate('${a.id}')"><i class="fa-solid fa-pause"></i> Deactivate</button>`;
    } else if (a.status === 'expired' || a.status === 'deactivated') {
      actions += `<button class="btn btn-green btn-sm" onclick="quickActivate('${a.id}')"><i class="fa-solid fa-play"></i> Activate</button>`;
    }
    actions += `<button class="btn btn-ghost btn-sm" onclick="openEdit('${a.id}')"><i class="fa-solid fa-pen"></i> Edit</button>`;
    actions += `<button class="btn btn-danger btn-sm" onclick="deleteAccount('${a.id}','${(a.label||a.username).replace(/'/g,"\\'")}')"><i class="fa-solid fa-trash"></i></button>`;

    return `<div class="acct-card">
      <div class="acct-bar" style="background:${col}"></div>
      <div class="acct-body">
        <div class="acct-top">
          <div class="acct-info">
            <div class="acct-label ${label?'':'empty'}">${label || 'No label set'}</div>
            <div class="acct-username">@${a.username}</div>
          </div>
          <span class="status-badge ${a.status}">${a.status}</span>
        </div>
        <div class="acct-meta">
          <div class="meta-item hl"><i class="fa-solid fa-calendar"></i>${expiryText}</div>
          ${a.price>0 ? `<div class="meta-item hl"><i class="fa-solid fa-coins"></i>${a.price}/mo</div>` : ''}
          <div class="meta-item"><i class="fa-solid fa-desktop"></i>${a.pc_count} PCs</div>
          <div class="meta-item"><i class="fa-solid fa-clock"></i>${lastAct}</div>
        </div>
        ${a.notes ? `<div class="acct-notes">${a.notes}</div>` : ''}
        <div class="acct-actions">${actions}</div>
      </div>
    </div>`;
  }).join('') + '</div>';
}

// ── Quick Actions ──────────────────────────────────────────────────────────────
async function quickApprove(id) {
  const expiry = Date.now() + 30 * 86400000;
  try {
    await api('PATCH','/admin/accounts/'+id,{ status:'active', expiry_date: expiry });
    const a = state.accounts.find(x=>x.id===id);
    if (a) { a.status='active'; a.expiry_date=expiry; }
    renderAccounts(); toast('Approved — 30 days active','ok');
  } catch(e) { toast(e.message,'err'); }
}

async function quickActivate(id) {
  const expiry = Date.now() + 30 * 86400000;
  try {
    await api('PATCH','/admin/accounts/'+id,{ status:'active', expiry_date: expiry });
    const a = state.accounts.find(x=>x.id===id);
    if (a) { a.status='active'; a.expiry_date=expiry; }
    renderAccounts(); toast('Activated — 30 days','ok');
  } catch(e) { toast(e.message,'err'); }
}

async function quickDeactivate(id) {
  if (!confirm('Deactivate this account?')) return;
  try {
    await api('PATCH','/admin/accounts/'+id,{ status:'deactivated' });
    const a = state.accounts.find(x=>x.id===id);
    if (a) a.status='deactivated';
    renderAccounts(); toast('Account deactivated','ok');
  } catch(e) { toast(e.message,'err'); }
}

async function deleteAccount(id, name) {
  if (!confirm(`Delete account "${name}"?\n\nThis removes ALL their groups, PCs and data permanently.`)) return;
  try {
    await api('DELETE','/admin/accounts/'+id);
    state.accounts = state.accounts.filter(a=>a.id!==id);
    renderAccounts(); toast('Account deleted','ok');
  } catch(e) { toast(e.message,'err'); }
}

// ── Edit Sheet ─────────────────────────────────────────────────────────────────
function openEdit(id) {
  const a = state.accounts.find(x=>x.id===id); if(!a) return;
  document.getElementById('edit-id').value = id;
  document.getElementById('edit-title').textContent = 'Edit — ' + (a.label || a.username);
  document.getElementById('edit-label').value = a.label || '';
  document.getElementById('edit-status').value = a.status;
  document.getElementById('edit-price').value = a.price || '';
  document.getElementById('edit-notes').value = a.notes || '';
  // Set expiry date
  if (a.expiry_date) {
    const d = new Date(a.expiry_date);
    const local = new Date(d.getTime() - d.getTimezoneOffset()*60000).toISOString().slice(0,16);
    document.getElementById('edit-expiry').value = local;
  } else {
    document.getElementById('edit-expiry').value = '';
  }
  updateExpiryDisplay();
  document.getElementById('bg-edit').classList.add('open');
  document.getElementById('sheet-edit').classList.add('open');
}

function closeEdit() {
  document.getElementById('sheet-edit').classList.remove('open');
  document.getElementById('bg-edit').classList.remove('open');
}

function addCustomDays(forceDays) {
  const days = forceDays || parseInt(document.getElementById('edit-custom-days').value);
  if (!days || days < 1) return;
  if (!forceDays) document.getElementById('edit-custom-days').value = '';
  // Always adds ON TOP of current expiry (or today if no expiry set)
  const current = document.getElementById('edit-expiry').value;
  const base = current ? new Date(current).getTime() : Date.now();
  const newTs = base + days * 86400000;
  const d = new Date(newTs);
  const local = new Date(d.getTime() - d.getTimezoneOffset()*60000).toISOString().slice(0,16);
  document.getElementById('edit-expiry').value = local;
  updateExpiryDisplay();
}

function setExpiry(days) {
  const d = new Date(Date.now() + days * 86400000);
  const local = new Date(d.getTime() - d.getTimezoneOffset()*60000).toISOString().slice(0,16);
  document.getElementById('edit-expiry').value = local;
  updateExpiryDisplay();
}

function clearExpiry() {
  document.getElementById('edit-expiry').value = '';
  updateExpiryDisplay();
}

function updateExpiryDisplay() {
  const val = document.getElementById('edit-expiry').value;
  const disp = document.getElementById('edit-expiry-display');
  if (!val) { disp.textContent = 'No expiry date — account never expires'; return; }
  const ts = new Date(val).getTime();
  const days = Math.ceil((ts - Date.now()) / 86400000);
  disp.textContent = days > 0 ? `${days} days from now` : `Expired ${Math.abs(days)} days ago`;
  disp.style.color = days > 5 ? 'var(--green)' : days > 0 ? 'var(--amber)' : 'var(--red)';
}

async function saveEdit() {
  const id = document.getElementById('edit-id').value;
  const expiryVal = document.getElementById('edit-expiry').value;
  const expiry_date = expiryVal ? new Date(expiryVal).getTime() : null;
  const updates = {
    label:       document.getElementById('edit-label').value.trim(),
    status:      document.getElementById('edit-status').value,
    price:       parseFloat(document.getElementById('edit-price').value)||0,
    expiry_date,
    notes:       document.getElementById('edit-notes').value.trim()
  };
  document.getElementById('edit-btn-text').innerHTML='<span class="spin"></span>';
  try {
    await api('PATCH','/admin/accounts/'+id, updates);
    const a = state.accounts.find(x=>x.id===id);
    if (a) Object.assign(a, updates);
    closeEdit(); renderAccounts(); toast('Saved','ok');
  } catch(e) { toast(e.message,'err'); }
  finally { document.getElementById('edit-btn-text').textContent='Save Changes'; }
}

// ── Utils ──────────────────────────────────────────────────────────────────────
function timeAgo(ms) {
  if (!ms) return 'never';
  const diff = Date.now() - ms;
  const m = Math.floor(diff/60000), h = Math.floor(diff/3600000), d = Math.floor(diff/86400000);
  if (m < 1) return 'just now';
  if (m < 60) return m+'m ago';
  if (h < 24) return h+'h ago';
  if (d < 30) return d+'d ago';
  return new Date(ms).toLocaleDateString();
}

function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast '+type+' show';
  clearTimeout(_toastT);
  _toastT = setTimeout(()=>el.classList.remove('show'), 2800);
}
</script>
